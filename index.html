<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Coding Assistant v3</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-bg: #f2f2f7;
            --ios-grey: #c7c7cc;
            --ios-text-bg: #ffffff;
            --ios-ai-msg: #e5e5ea;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 600px;
            background: var(--ios-text-bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            padding: 12px 15px;
            background: #f8f8f8;
            border-bottom: 1px solid #e5e5ea;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .api-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid var(--ios-grey);
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            background-color: var(--ios-bg);
        }
        .api-input:focus {
            border-color: var(--ios-blue);
        }
        .chat-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 16px;
            border-radius: 18px;
            max-width: 80%;
            line-height: 1.4;
            font-size: 15px;
            word-wrap: break-word;
            position: relative;
        }
        .user-message {
            background-color: var(--ios-blue);
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background-color: var(--ios-ai-msg);
            color: #000000;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        pre {
            background-color: #1c1c1e;
            color: #f2f2f7;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
            margin: 10px 0;
        }
        code {
            font-family: monospace;
        }
        .input-area {
            padding: 10px 15px;
            background: #f8f8f8;
            border-top: 1px solid #e5e5ea;
            display: flex;
            gap: 10px;
            align-items: center;
            position: sticky;
            bottom: 0;
            z-index: 100;
        }
        .upload-btn {
            background: none;
            border: none;
            color: var(--ios-blue);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
        }
        .chat-input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid var(--ios-grey);
            font-size: 16px;
            outline: none;
            background-color: var(--ios-bg);
        }
        .send-btn {
            background: none;
            border: none;
            color: var(--ios-blue);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            padding: 5px 10px;
        }
        .send-btn:disabled {
            color: var(--ios-grey);
        }
        #imagePreview {
            display: none;
            max-width: 50px;
            max-height: 50px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid var(--ios-blue);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <input type="password" id="apiKey" class="api-input" placeholder="Paste API Key Together.ai di sini...">
    </div>
    
    <div class="chat-container" id="chatBox">
        <div class="message ai-message">
            Sistem diperbarui ke v3 (Support Vision API Lanjutan).<br><br>
            Silakan kirimkan ide aplikasi presensi Anda atau upload gambar error jika ada kendala.
        </div>
    </div>
    
    <div class="input-area">
        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage()">
        <button class="upload-btn" onclick="document.getElementById('imageInput').click()">+</button>
        <img id="imagePreview" alt="Preview">
        <input type="text" id="userInput" class="chat-input" placeholder="Tulis pesan..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" class="send-btn" onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
    const SYSTEM_PROMPT = `Anda adalah asisten AI ahli pembuat aplikasi untuk pengguna NON-programmer. Berikan KODE SECARA UTUH agar pengguna tinggal copy-paste. Gunakan bahasa Indonesia. Jika diberi gambar, periksa error pada gambar tersebut.`;

    let chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];
    let currentImageBase64 = null;

    function handleKeyPress(event) {
        if (event.key === 'Enter') { sendMessage(); }
    }

    function appendMessage(sender, text, isImage = false) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}-message`;
        
        if (isImage) {
            msgDiv.innerHTML = `<img src="${text}" style="max-width: 100%; border-radius: 12px; margin-top: 5px;" alt="Upload">`;
        } else {
            const formattedText = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            msgDiv.innerHTML = formattedText;
        }
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function previewImage() {
        const fileInput = document.getElementById('imageInput');
        const preview = document.getElementById('imagePreview');
        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                currentImageBase64 = e.target.result; 
                appendMessage('user', e.target.result, true); 
            }
            reader.readAsDataURL(fileInput.files[0]);
        }
    }

    async function sendMessage() {
        const apiKey = document.getElementById('apiKey').value.trim();
        let userInput = document.getElementById('userInput').value.trim();
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('imageInput');
        const preview = document.getElementById('imagePreview');

        if (!apiKey) { alert('Harap masukkan API Key terlebih dahulu.'); return; }
        if (!userInput && !currentImageBase64) return;

        // Tampilkan pesan teks pengguna di layar
        if (userInput) appendMessage('user', userInput);

        // Format pesan sesuai standar API Llama Vision
        let messageContent;
        if (currentImageBase64) {
            messageContent = [
                { type: "text", text: userInput || "Tolong analisa gambar ini." },
                { type: "image_url", image_url: { url: currentImageBase64 } }
            ];
        } else {
            messageContent = userInput;
        }

        chatHistory.push({ role: "user", content: messageContent });

        // Reset UI
        document.getElementById('userInput').value = '';
        currentImageBase64 = null;
        preview.style.display = 'none';
        fileInput.value = '';
        sendBtn.disabled = true;
        sendBtn.innerText = '...';

        try {
            const response = await fetch('https://api.together.xyz/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "meta-llama/Llama-3.2-90B-Vision-Instruct-Turbo", 
                    messages: chatHistory,
                    temperature: 0.5
                })
            });

            // Parse response dari server terlebih dahulu
            const data = await response.json();

            // Tangkap pesan error spesifik jika gagal
            if (!response.ok) {
                const serverError = data.error ? (data.error.message || JSON.stringify(data.error)) : 'Unknown Error';
                throw new Error(`Ditolak Server: ${serverError}`);
            }

            const aiResponse = data.choices[0].message.content;
            appendMessage('ai', aiResponse);
            chatHistory.push({ role: "assistant", content: aiResponse });

        } catch (error) {
            appendMessage('ai', `❌ <b>ERROR API</b>: <br>${error.message}`);
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerText = 'Kirim';
        }
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => {
                console.log('Service Worker gagal:', err);
            });
        });
    }
</script>
</body>
</html>
