<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Coding Assistant</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        /* Desain bergaya iOS */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 600px;
            background: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            padding: 15px 20px;
            background: #f8f8f8;
            border-bottom: 1px solid #e5e5ea;
        }
        .api-input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #c7c7cc;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
        }
        .api-input:focus {
            border-color: #007aff;
        }
        .chat-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 20px;
            max-width: 85%;
            line-height: 1.4;
            font-size: 16px;
            word-wrap: break-word;
        }
        .user-message {
            background-color: #007aff;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background-color: #e5e5ea;
            color: #000000;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        pre {
            background-color: #1c1c1e;
            color: #f2f2f7;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
        }
        code {
            font-family: monospace;
        }
        .input-area {
            padding: 12px 15px;
            background: #f8f8f8;
            border-top: 1px solid #e5e5ea;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .chat-input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #c7c7cc;
            font-size: 16px;
            outline: none;
        }
        .send-btn {
            background: none;
            border: none;
            color: #007aff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            padding: 5px 10px;
        }
        .send-btn:disabled {
            color: #c7c7cc;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <input type="password" id="apiKey" class="api-input" placeholder="Paste API Key Together.ai di sini...">
    </div>
    
    <div class="chat-container" id="chatBox">
        <div class="message ai-message">Halo! Masukkan API Key Anda di atas, lalu ketikkan ide aplikasi yang ingin Anda buat. Saya akan memandu Anda secara utuh.</div>
    </div>
    
    <div class="input-area">
        <input type="text" id="userInput" class="chat-input" placeholder="Pesan..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" class="send-btn" onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
    // System prompt untuk mengatur perilaku AI sesuai permintaan Anda
    const SYSTEM_PROMPT = `Anda adalah asisten AI ahli pembuat aplikasi. Pengguna Anda BUKAN programmer dan tidak biasa koding. 
1. Pandu pengguna step-by-step secara sangat detail.
2. Saat memberikan, mengubah, atau menambah kode, BERIKAN KODE SECARA UTUH agar pengguna tinggal copy-paste.
3. KECUALI perubahannya sangat mudah atau minor, barulah Anda boleh memandu mengubahnya secara parsial pada baris yang perlu diubah saja.
4. Gunakan bahasa Indonesia yang mudah dipahami.`;

    let chatHistory = [
        { role: "system", content: SYSTEM_PROMPT }
    ];

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function appendMessage(sender, text) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}-message`;
        
        // Membungkus blok kode agar rapi jika AI mengirimkan kode
        const formattedText = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        msgDiv.innerHTML = formattedText;
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const userInput = document.getElementById('userInput').value.trim();
        const sendBtn = document.getElementById('sendBtn');

        if (!apiKey) {
            alert('Harap masukkan API Key Together.ai terlebih dahulu di kolom atas.');
            return;
        }
        if (!userInput) return;

        // Tampilkan pesan pengguna
        appendMessage('user', userInput);
        document.getElementById('userInput').value = '';
        sendBtn.disabled = true;
        sendBtn.innerText = '...';

        // Simpan ke history
        chatHistory.push({ role: "user", content: userInput });

        try {
            const response = await fetch('https://api.together.xyz/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "meta-llama/Llama-3-70b-chat-hf", // Anda bisa mengubah model di sini jika perlu
                    messages: chatHistory,
                    temperature: 0.7
                })
            });

            if (!response.ok) {
                throw new Error('Gagal menghubungi API. Pastikan API Key benar.');
            }

            const data = await response.json();
            const aiResponse = data.choices[0].message.content;

            appendMessage('ai', aiResponse);
            chatHistory.push({ role: "assistant", content: aiResponse });

        } catch (error) {
            appendMessage('ai', `Error: ${error.message}`);
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerText = 'Kirim';
        }
    }

    // Registrasi Service Worker untuk PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => {
                console.log('Service Worker gagal didaftarkan:', err);
            });
        });
    }
</script>
</body>
</html>
