<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Coding Assistant v4</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-bg: #f2f2f7;
            --ios-grey: #c7c7cc;
            --ios-text-bg: #ffffff;
            --ios-ai-msg: #e5e5ea;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 600px;
            background: var(--ios-text-bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            padding: 12px 15px;
            background: #f8f8f8;
            border-bottom: 1px solid #e5e5ea;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .api-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid var(--ios-grey);
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            background-color: var(--ios-bg);
        }
        .api-input:focus {
            border-color: var(--ios-blue);
        }
        .chat-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 16px;
            border-radius: 18px;
            max-width: 80%;
            line-height: 1.4;
            font-size: 15px;
            word-wrap: break-word;
            position: relative;
        }
        .user-message {
            background-color: var(--ios-blue);
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background-color: var(--ios-ai-msg);
            color: #000000;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        pre {
            background-color: #1c1c1e;
            color: #f2f2f7;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
            margin: 10px 0;
        }
        code {
            font-family: monospace;
        }
        .input-area {
            padding: 10px 15px;
            background: #f8f8f8;
            border-top: 1px solid #e5e5ea;
            display: flex;
            gap: 10px;
            align-items: center;
            position: sticky;
            bottom: 0;
            z-index: 100;
        }
        .chat-input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid var(--ios-grey);
            font-size: 16px;
            outline: none;
            background-color: var(--ios-bg);
        }
        .send-btn {
            background: none;
            border: none;
            color: var(--ios-blue);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            padding: 5px 10px;
        }
        .send-btn:disabled {
            color: var(--ios-grey);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <input type="password" id="apiKey" class="api-input" placeholder="Paste API Key Together.ai di sini...">
    </div>
    
    <div class="chat-container" id="chatBox">
        <div class="message ai-message">
            Sistem siap dengan model <b>Meta Llama 3.3 70B</b>!<br><br>
            Silakan kirimkan konsep aplikasi presensi guru berbasis PWA dan Spreadsheet yang ingin Anda buat. Jika ada error kode nanti, cukup copy-paste teks errornya ke sini.
        </div>
    </div>
    
    <div class="input-area">
        <input type="text" id="userInput" class="chat-input" placeholder="Tulis pesan..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" class="send-btn" onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
    const SYSTEM_PROMPT = `Anda adalah asisten AI ahli pembuat aplikasi untuk pengguna NON-programmer. Berikan KODE SECARA UTUH agar pengguna tinggal copy-paste. Gunakan bahasa Indonesia yang mudah dipahami. Jika pengguna memberikan teks error, analisa dan perbaiki kodenya secara detail.`;

    let chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];

    function handleKeyPress(event) {
        if (event.key === 'Enter') { sendMessage(); }
    }

    function appendMessage(sender, text) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}-message`;
        
        const formattedText = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        msgDiv.innerHTML = formattedText;
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const apiKey = document.getElementById('apiKey').value.trim();
        let userInput = document.getElementById('userInput').value.trim();
        const sendBtn = document.getElementById('sendBtn');

        if (!apiKey) { alert('Harap masukkan API Key terlebih dahulu.'); return; }
        if (!userInput) return;

        appendMessage('user', userInput);
        chatHistory.push({ role: "user", content: userInput });

        document.getElementById('userInput').value = '';
        sendBtn.disabled = true;
        sendBtn.innerText = '...';

        try {
            const response = await fetch('https://api.together.xyz/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    // Menggunakan model teks tercanggih yang 100% Serverless
                    model: "meta-llama/Llama-3.3-70B-Instruct-Turbo", 
                    messages: chatHistory,
                    temperature: 0.5
                })
            });

            const data = await response.json();

            if (!response.ok) {
                const serverError = data.error ? (data.error.message || JSON.stringify(data.error)) : 'Unknown Error';
                throw new Error(`Ditolak Server: ${serverError}`);
            }

            const aiResponse = data.choices[0].message.content;
            appendMessage('ai', aiResponse);
            chatHistory.push({ role: "assistant", content: aiResponse });

        } catch (error) {
            appendMessage('ai', `❌ <b>ERROR API</b>: <br>${error.message}`);
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerText = 'Kirim';
        }
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => {
                console.log('Service Worker gagal:', err);
            });
        });
    }
</script>
</body>
</html>
